<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Flat Newspaper and Lens Icon (No Glows, No Shadows, No Gradients) -->
  <g transform="translate(35, 35)">
    <!-- Base Folded Back Page (Flat Gray) -->
    <rect x="15" y="10" width="100" height="120" rx="8" fill="#E5E7EB" />
    
    <!-- Front Newspaper Page (Flat White with Gray Border) -->
    <rect x="5" y="20" width="100" height="120" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" />
    
    <!-- Newspaper Masthead (Flat Dark Gray & Blue) -->
    <rect x="15" y="32" width="50" height="10" rx="2" fill="#111827" />
    <rect x="70" y="32" width="25" height="10" rx="2" fill="#3B82F6" />
    
    <!-- Column 1: Flat Image Block -->
    <rect x="15" y="50" width="40" height="30" rx="4" fill="#E5E7EB" />
    
    <!-- Column 2: Flat Text Lines -->
    <rect x="60" y="50" width="35" height="4" rx="1" fill="#4B5563" />
    <rect x="60" y="58" width="35" height="4" rx="1" fill="#4B5563" />
    <rect x="60" y="66" width="35" height="4" rx="1" fill="#4B5563" />
    <rect x="60" y="74" width="20" height="4" rx="1" fill="#4B5563" />

    <!-- Main Article Lines below image -->
    <rect x="15" y="90" width="80" height="4" rx="1" fill="#4B5563" />
    <rect x="15" y="98" width="80" height="4" rx="1" fill="#4B5563" />
    <rect x="15" y="106" width="80" height="4" rx="1" fill="#4B5563" />
    <rect x="15" y="114" width="50" height="4" rx="1" fill="#4B5563" />
    
    <!-- Fold Accent Line -->
    <path d="M 5 84 L 105 84" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4" />
  </g>

  <!-- TruthLens (Magnifying Glass Overlay - Flat Design) -->
  <g>
    <!-- Magnifying Glass Handle (Flat Blue & Dark Gray) -->
    <path d="M 148 138 L 175 165" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" />
    <path d="M 152 142 L 171 161" stroke="#111827" stroke-width="2" stroke-linecap="round" />

    <!-- Flat Circle Frame (Digital Blue with very light background fill) -->
    <circle cx="125" cy="115" r="32" fill="#3B82F6" fill-opacity="0.05" stroke="#3B82F6" stroke-width="5" />
    
    <!-- Flat Lens Glare Line (White, No Blur) -->
    <path d="M 105 100 A 28 28 0 0 1 145 100" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8" />
  </g>
  
  <!-- Scan / Detection Highlight Effect -->
  <g>
    <circle cx="125" cy="115" r="3.5" fill="#10B981" />
    <!-- Small digital bracket overlay -->
    <path d="M 105 110 L 105 100 L 115 100" fill="none" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 145 120 L 145 130 L 135 130" fill="none" stroke="#3B82F6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
